<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SAGONA</title>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/nc_assets/css/style.css">

  <!-- Favicon -->
  <link rel="icon" href="/nc_assets/img/favicon-32x32.png">
</head>

<body>

  <!-- TOP STRIP -->
  <div class="top-strip">NEW COLLECTION COMING SOON</div>

  <!-- HEADER -->
  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html">SAGONA</a>

      <nav class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="#" id="open-cart">Cart</a>
        <a href="login.html">Sign In</a>
      </nav>
    </div>
  </header>

  <!-- CART DRAWER (ONLY ONCE) -->
  <div id="cart-drawer" class="cart-drawer">
    <div class="cart-overlay" id="cart-overlay"></div>

    <div class="cart-panel">
      <div class="cart-header">
        <h3>Your Bag</h3>
        <span id="close-cart" class="close">&times;</span>
      </div>

      <div id="drawer-items" class="cart-items"></div>

      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span>
          <strong id="drawer-total">₹0</strong>
        </div>

        <a href="cart.html" class="btn ghost">View Cart</a>
        <button class="btn gold">Checkout</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <main class="container">

    <!-- HERO -->
    <section class="hero">
      <div>
        <h1>Luxury Kidswear</h1>
        <p>Refined elegance for modern childhood.</p>
        <a href="shop.html" class="btn gold">Shop Collection</a>
      </div>

      <img src="https://images.unsplash.com/photo-1522771930-78848d9293e8">
    </section>

    <!-- FEATURED -->
    <section>
      <h2 class="page-title">Featured</h2>
      <div id="featured-products" class="grid"></div>
    </section>

  </main>

  <footer class="footer">
    <div class="container">© 2026 SAGONA</div>
  </footer>

  <script type="module" src="/nc_assets/js/main.js"></script>

</body>

</html>
