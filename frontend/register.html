<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGONA Register</title>

    <!-- Optional: reuse your main CSS -->
    <link rel="stylesheet" href="nc_assets/css/style.css">
</head>

<body>

    <div style="max-width:400px; margin:80px auto; text-align:center;">
        <h2>Register</h2>

        <input id="name" placeholder="Name" style="width:100%; padding:10px;"><br><br>
        <input id="email" placeholder="Email" style="width:100%; padding:10px;"><br><br>
        <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px;"><br><br>

        <button onclick="register()" style="padding:10px 20px;">Register</button>

        <p id="status" style="margin-top:15px; color:#333;"></p>

        <p style="margin-top:10px;">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>

    <!-- IMPORTANT: Correct JS path -->
    <script src="nc_assets/js/auth.js"></script>

</body>

</html>
