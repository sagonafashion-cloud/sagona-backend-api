<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | SAGONA</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container" style="padding: 4rem 0">
      <form id="register-form" class="panel" style="max-width: 480px; margin: auto">
        <h1 class="page-title">Register</h1>
        <input name="name" class="field" placeholder="Name" required />
        <input name="email" type="email" class="field" placeholder="Email" required />
        <input name="password" type="password" class="field" placeholder="Password" required />
        <input name="birthday" type="date" class="field" />
        <button class="btn gold" type="submit">Create account</button>
        <p>Already have an account? <a href="login.html">Login</a></p>
      </form>
    </main>

    <script type="module">
        const moduleCandidates = ["./js/auth.js", "./frontend/js/auth.js"];
        let loaded = false;
        for (const modulePath of moduleCandidates) {
            try {
                await import(modulePath);
                loaded = true;
                break;
            } catch (_error) {
                // Try next candidate path.
            }
        }
        if (!loaded) {
            console.error("Unable to load frontend module for auth.js");
        }
    </script>
  </body>
</html>
