<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register – SAGONA</title>
    <link rel="stylesheet" href="nc_assets/css/style.css">
</head>

<body>

    <header class="lux-header">
        <h1>SAGONA</h1>
    </header>

    <section class="auth">
        <h2>Create Account</h2>

        <input type="text" id="name" placeholder="Full Name"><br><br>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="password" id="password" placeholder="Password"><br><br>

        <button id="registerBtn">Register</button>

        <p>Already have account? <a href="login.html">Login</a></p>
    </section>

    <script src="nc_assets/js/auth.js"></script>

</body>

</html>
