<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password | SAGONA</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/nc_assets/CCS/style.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="icon" href="/favicon/favicon.ico">
</head>

<body>

  <div class="auth-split">

    <div class="auth-panel">

      <a href="index.html" class="auth-logo">SAGONA</a>

      <div id="step-request">
        <h1>Forgot Password</h1>
        <p class="auth-sub">Enter your email and we'll send a one-time code</p>

        <div class="float-field">
          <input type="text" id="rp-identifier" placeholder=" " autocomplete="username">
          <label for="rp-identifier">Email Address</label>
        </div>

        <button class="auth-submit" id="rp-send-btn">Send OTP</button>
        <p id="rp-msg" style="font-size:13px;margin-top:12px;text-align:center"></p>
        <p class="auth-switch"><a href="login.html">← Back to Sign In</a></p>
      </div>

      <div id="step-reset" style="display:none">
        <h1>Reset Password</h1>
        <p class="auth-sub">Enter the OTP sent to your email</p>

        <div class="float-field">
          <input type="text" id="rp-otp" placeholder=" " maxlength="6" inputmode="numeric">
          <label for="rp-otp">6-digit OTP</label>
        </div>

        <div class="float-field">
          <input type="password" id="rp-newpass" placeholder=" " minlength="6" autocomplete="new-password">
          <label for="rp-newpass">New Password (min 6 chars)</label>
        </div>

        <button class="auth-submit" id="rp-reset-btn">Reset Password</button>
        <p id="rp-reset-msg" style="font-size:13px;margin-top:12px;text-align:center"></p>
      </div>

    </div>

    <div class="auth-image">
      <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1200&q=80" alt="SAGONA" loading="lazy">
      <div class="auth-image-overlay">
        <p>Premium Indian Kidswear</p>
        <h2>Dress them<br>with love</h2>
      </div>
    </div>

  </div>

  <script type="module">
    import { request } from '/nc_assets/js/api.js';

    const sendBtn   = document.getElementById('rp-send-btn');
    const resetBtn  = document.getElementById('rp-reset-btn');
    const msg       = document.getElementById('rp-msg');
    const resetMsg  = document.getElementById('rp-reset-msg');

    // Pre-fill from URL param ?email=...
    const params = new URLSearchParams(location.search);
    if (params.get('email')) document.getElementById('rp-identifier').value = params.get('email');

    sendBtn.addEventListener('click', async () => {
      const identifier = document.getElementById('rp-identifier').value.trim();
      if (!identifier) { msg.textContent = 'Please enter your email.'; msg.style.color = '#c00'; return; }
      sendBtn.disabled = true; sendBtn.textContent = 'Sending…';
      msg.textContent = '';
      try {
        await request('/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ identifier, email: identifier })
        });
        msg.textContent = 'OTP sent! Check your inbox.';
        msg.style.color = '#1D9E75';
        document.getElementById('step-request').style.display = 'none';
        document.getElementById('step-reset').style.display = 'block';
      } catch (err) {
        msg.textContent = err.message || 'Failed to send OTP.';
        msg.style.color = '#c00';
      } finally {
        sendBtn.disabled = false; sendBtn.textContent = 'Send OTP';
      }
    });

    resetBtn.addEventListener('click', async () => {
      const email      = document.getElementById('rp-identifier').value.trim();
      const otp        = document.getElementById('rp-otp').value.trim();
      const newPassword = document.getElementById('rp-newpass').value;
      if (!otp || !newPassword) { resetMsg.textContent = 'Enter OTP and new password.'; resetMsg.style.color = '#c00'; return; }
      resetBtn.disabled = true; resetBtn.textContent = 'Resetting…';
      try {
        await request('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ email, otp, newPassword })
        });
        resetMsg.textContent = 'Password reset successfully! Redirecting to sign in…';
        resetMsg.style.color = '#1D9E75';
        setTimeout(() => { location.href = 'login.html'; }, 1500);
      } catch (err) {
        resetMsg.textContent = err.message || 'Reset failed. Check your OTP and try again.';
        resetMsg.style.color = '#c00';
      } finally {
        resetBtn.disabled = false; resetBtn.textContent = 'Reset Password';
      }
    });
  </script>

</body>
</html>
