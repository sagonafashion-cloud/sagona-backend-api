<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Admin | SAGONA</title>

  <link rel="stylesheet" href="/nc_assets/css/style.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/favicon.ico">
  <!-- Favicon Setup -->
  <link rel="icon" href="/nc_assets/img/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>

<body>

  <header class="header">
    <div class="container nav">
      <a class="brand">SAGONA ADMIN</a>
    </div>
  </header>

  <main class="container">

    <h1 class="page-title">Dashboard</h1>

    <div class="grid">
      <div class="panel">
        <h3>Total Orders</h3>
        <p id="total-orders">0</p>
      </div>

      <div class="panel">
        <h3>Total Revenue</h3>
        <p id="total-revenue">₹0</p>
      </div>
    </div>

    <form id="product-form" class="panel">
      <h3>Add Product</h3>

      <input name="name" class="field" placeholder="Name" required />
      <input name="price" type="number" class="field" placeholder="Price" required />
      <input name="image" class="field" placeholder="Image URL" required />
      <textarea name="description" class="field" required></textarea>

      <button class="btn gold">Add Product</button>
    </form>

    <h2 class="page-title">Products</h2>
    <div id="admin-products"></div>

    <h2 class="page-title">Orders</h2>
    <div id="admin-orders" class="grid"></div>

  </main>

  <script type="module" src="/nc_assets/js/main.js"></script>

</body>

</html>
