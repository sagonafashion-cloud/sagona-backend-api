<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin | SAGONA</title>
    <base href="/" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container nav">
        <a class="brand" href="index.html">SAGONA ADMIN</a>
      </div>
    </header>

    <main class="container">
      <h1 class="page-title">Dashboard</h1>

      <div class="layout-2">
        <div class="panel">
          <h3>Total Orders: <span id="total-orders">0</span></h3>
          <h3>Total Revenue: <span id="total-revenue">₹0</span></h3>
        </div>

        <form id="product-form" class="panel">
          <h3>Add product</h3>
          <input name="name" class="field" placeholder="Product name" required />
          <input name="price" type="number" class="field" placeholder="Price" required />
          <input name="image" class="field" placeholder="Image URL" required />
          <textarea name="description" class="field" placeholder="Description" required></textarea>
          <label><input type="checkbox" name="featured" /> Featured</label>
          <br />
          <br />
          <button class="btn gold" type="submit">Add Product</button>
        </form>
      </div>

      <h2 class="page-title">Products</h2>
      <div id="admin-products" class="panel"></div>

      <h2 class="page-title">Orders</h2>
      <div id="admin-orders" class="grid"></div>
    </main>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
