<body>

    <header class="header">
        <div class="container nav">
            <a class="brand" href="index.html">SAGONA</a>
        </div>
    </header>

    <main class="container" style="padding: 4rem 0">

        <form id="login-form" class="panel" style="max-width: 420px; margin:auto">

            <h1 class="page-title">Welcome Back</h1>
            <p style="color:#6e665c;">Login to continue shopping</p>

            <input name="email" type="email" class="field" placeholder="Email" required />
            <input name="password" type="password" class="field" placeholder="Password" required />

            <button class="btn gold" type="submit">Login</button>

            <p style="margin-top:1rem;">
                New here? <a href="register.html">Create account</a>
            </p>

            <p id="error-msg" style="color:red; display:none;"></p>

        </form>

    </main>

    <script type="module">
        import { request } from '/nc_assets/js/api.js';
        import { saveToken, saveUser } from '/nc_assets/js/storage.js';

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorMsg.style.display = "none";

            const btn = form.querySelector("button");
            btn.disabled = true;
            btn.textContent = "Logging in...";

            try {
                const data = await request('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        email: form.email.value,
                        password: form.password.value
                    })
                });

                saveToken(data.token);
                saveUser(data);

                window.location.href = "index.html";

            } catch (err) {
                errorMsg.textContent = err.message || "Login failed";
                errorMsg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Login";
            }
        });
    </script>
