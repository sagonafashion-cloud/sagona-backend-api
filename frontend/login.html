<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | SAGONA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container" style="padding: 4rem 0">
      <form id="login-form" class="panel" style="max-width: 480px; margin: auto">
        <h1 class="page-title">Login</h1>
        <input name="email" type="email" class="field" placeholder="Email" required />
        <input name="password" type="password" class="field" placeholder="Password" required />
        <button class="btn gold" type="submit">Login</button>
        <p>No account? <a href="register.html">Register</a></p>
      </form>
    </main>

    <script type="module" src="js/auth.js"></script>
  </body>
</html>
