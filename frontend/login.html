<body>

  <div class="auth-split">

    <!-- ═══ LEFT: FORM PANEL ═══ -->
    <div class="auth-panel">

      <a href="index.html" class="auth-logo">SAGONA</a>

      <h1>Welcome Back</h1>
      <p class="auth-sub">Sign in to continue shopping</p>

      <p id="session-msg" style="display:none;margin:-8px 0 16px;padding:10px 14px;background:#FEF6E7;border:0.5px solid #EFC97C;border-radius:4px;font-size:13px;color:#8A6116"></p>

      <form id="login-form" autocomplete="on">

        <div class="float-field">
          <input name="identifier" type="text" id="f-identifier" placeholder=" " required autocomplete="username" inputmode="email">
          <label for="f-identifier">Email or Phone Number</label>
        </div>

        <div class="float-field">
          <input name="password" type="password" id="f-password" placeholder=" " required autocomplete="current-password">
          <label for="f-password">Password</label>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin:-4px 0 16px">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray);cursor:pointer">
            <input type="checkbox" id="remember-me" style="accent-color:var(--gold)"> Remember me
          </label>
          <a href="#" id="forgot-link" style="font-size:13px;color:var(--gold);text-decoration:none">Forgot password?</a>
        </div>

        <button class="auth-submit" type="submit" id="login-btn">Sign In</button>

        <p id="error-msg" class="auth-error"></p>

        <p class="auth-switch">
          New here? <a href="register.html">Create account</a>
        </p>

      </form>

      <!-- Forgot password inline panel -->
      <div id="forgot-panel" style="display:none;margin-top:24px;padding:20px;background:#f9f8f6;border-radius:8px">
        <h3 style="font-size:16px;margin:0 0 8px">Reset Password</h3>
        <p style="font-size:13px;color:var(--gray);margin:0 0 16px">Enter your email and we'll send you a one-time code.</p>
        <div class="float-field">
          <input type="text" id="fp-identifier" placeholder=" ">
          <label>Email Address</label>
        </div>
        <button id="fp-send-btn" style="width:100%;padding:12px;background:var(--black);color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer;margin-top:4px">Send OTP</button>
        <div id="fp-otp-row" style="display:none;margin-top:16px">
          <div class="float-field">
            <input type="text" id="fp-otp" placeholder=" " maxlength="6" inputmode="numeric">
            <label>6-digit OTP</label>
          </div>
          <div class="float-field">
            <input type="password" id="fp-newpass" placeholder=" " minlength="6">
            <label>New Password</label>
          </div>
          <button id="fp-reset-btn" style="width:100%;padding:12px;background:var(--gold);color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer">Reset Password</button>
        </div>
        <p id="fp-msg" style="font-size:13px;margin-top:10px;text-align:center"></p>
        <p style="text-align:center;margin-top:10px"><a href="#" id="fp-cancel" style="font-size:13px;color:var(--gray)">← Back to sign in</a></p>
      </div>

    </div>

    <!-- ═══ RIGHT: IMAGE PANEL ═══ -->
    <div class="auth-image">
      <img
        src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1200&q=80"
        alt="SAGONA Fashion"
        loading="lazy"
      >
      <div class="auth-image-overlay">
        <p>Premium Indian Kidswear</p>
        <h2>Dress them<br>with love</h2>
      </div>
    </div>

  </div>

  <!-- WhatsApp FAB -->
  <a href="https://wa.me/919099690446?text=Hi%20Sagona%2C%20I%20need%20help" class="whatsapp-fab" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.822.736 5.47 2.027 7.773L0 32l8.476-2.004A15.942 15.942 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm8.14 22.085c-.34.957-1.99 1.826-2.742 1.94-.703.108-1.59.153-2.563-.16-.59-.192-1.347-.449-2.31-.88-4.065-1.76-6.717-5.847-6.918-6.12-.2-.275-1.63-2.17-1.63-4.135 0-1.965 1.032-2.93 1.397-3.33.365-.4.795-.5 1.06-.5.266 0 .531.003.764.013.245.01.574-.093.9.686.34.8 1.153 2.764 1.254 2.963.1.2.167.435.033.7-.133.266-.2.43-.399.663-.2.234-.42.523-.6.703-.2.2-.408.416-.175.815.233.4 1.036 1.71 2.224 2.77 1.528 1.362 2.815 1.784 3.215 1.984.4.2.633.167.866-.1.233-.266.997-1.165 1.264-1.564.266-.4.532-.333.897-.2.366.133 2.33 1.098 2.73 1.298.4.2.665.3.764.467.1.165.1.954-.24 1.91z"/></svg>
  </a>

  <script type="module">
    import { request } from '/nc_assets/js/api.js';
    import { saveToken, saveUser } from '/nc_assets/js/storage.js';

    const form       = document.getElementById('login-form');
    const errorMsg   = document.getElementById('error-msg');
    const btn        = document.getElementById('login-btn');
    const rememberMe = document.getElementById('remember-me');
    const sessionMsg = document.getElementById('session-msg');

    // Pre-fill identifier if remembered
    const remembered = localStorage.getItem('sagona_remember');
    if (remembered) {
      document.getElementById('f-identifier').value = remembered;
      rememberMe.checked = true;
    }

    // Show a one-time "session expired" notice if we were bounced here after
    // an old/rotated JWT was rejected (see api.js's handleSessionExpired()).
    // Read-then-clear so it only ever shows once, even on refresh.
    try {
      const loginMessage = sessionStorage.getItem('loginMessage');
      if (loginMessage) {
        sessionMsg.textContent   = loginMessage;
        sessionMsg.style.display = 'block';
        sessionStorage.removeItem('loginMessage');
      }
    } catch { /* sessionStorage unavailable — non-fatal */ }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      errorMsg.style.display = 'none';
      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      const identifier = document.getElementById('f-identifier').value.trim();

      try {
        const data = await request('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            identifier,
            email:    identifier,   // backward-compat for mobile app schema
            password: form.password.value
          })
        });

        if (rememberMe.checked) {
          localStorage.setItem('sagona_remember', identifier);
        } else {
          localStorage.removeItem('sagona_remember');
        }

        saveToken(data.token);
        saveUser(data);

        // `next` comes straight from the URL query string — never follow it
        // blindly (open-redirect risk). Only allow a bare same-site page
        // name (e.g. "account.html", optionally with its own query string);
        // reject absolute URLs, protocol-relative "//host" URLs, and anything
        // with a path separator that could point off-site.
        const rawNext = new URLSearchParams(location.search).get('next') || '';
        const next = /^[a-zA-Z0-9_-]+\.html(\?[^\s'"<>]*)?$/.test(rawNext) ? rawNext : 'index.html';
        window.location.href = next;

      } catch (err) {
        errorMsg.textContent   = err.message || 'Login failed. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });

    /* ── Forgot password ── */
    const forgotLink  = document.getElementById('forgot-link');
    const forgotPanel = document.getElementById('forgot-panel');
    const fpCancel    = document.getElementById('fp-cancel');
    const fpSendBtn   = document.getElementById('fp-send-btn');
    const fpResetBtn  = document.getElementById('fp-reset-btn');
    const fpMsg       = document.getElementById('fp-msg');

    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      form.style.display = 'none';
      forgotPanel.style.display = 'block';
      // Pre-fill from login field
      const id = document.getElementById('f-identifier').value.trim();
      if (id) document.getElementById('fp-identifier').value = id;
    });

    fpCancel.addEventListener('click', (e) => {
      e.preventDefault();
      forgotPanel.style.display = 'none';
      form.style.display = 'block';
    });

    fpSendBtn.addEventListener('click', async () => {
      const identifier = document.getElementById('fp-identifier').value.trim();
      if (!identifier) { fpMsg.textContent = 'Please enter your email.'; fpMsg.style.color = '#c00'; return; }
      fpSendBtn.disabled = true; fpSendBtn.textContent = 'Sending…';
      fpMsg.textContent = '';
      try {
        await request('/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ identifier, email: identifier })
        });
        fpMsg.textContent = 'OTP sent! Check your inbox.';
        fpMsg.style.color = '#1D9E75';
        document.getElementById('fp-otp-row').style.display = 'block';
      } catch (err) {
        fpMsg.textContent = err.message || 'Failed to send OTP.';
        fpMsg.style.color = '#c00';
      } finally {
        fpSendBtn.disabled = false; fpSendBtn.textContent = 'Send OTP';
      }
    });

    fpResetBtn.addEventListener('click', async () => {
      const email      = document.getElementById('fp-identifier').value.trim();
      const otp        = document.getElementById('fp-otp').value.trim();
      const newPassword = document.getElementById('fp-newpass').value;
      if (!otp || !newPassword) { fpMsg.textContent = 'Enter OTP and new password.'; fpMsg.style.color = '#c00'; return; }
      fpResetBtn.disabled = true; fpResetBtn.textContent = 'Resetting…';
      try {
        await request('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ email, otp, newPassword })
        });
        fpMsg.textContent = 'Password reset! Redirecting to sign in…';
        fpMsg.style.color = '#1D9E75';
        setTimeout(() => { forgotPanel.style.display = 'none'; form.style.display = 'block'; }, 1800);
      } catch (err) {
        fpMsg.textContent = err.message || 'Reset failed. Check your OTP.';
        fpMsg.style.color = '#c00';
      } finally {
        fpResetBtn.disabled = false; fpResetBtn.textContent = 'Reset Password';
      }
    });
  </script>

</body>
</html>
