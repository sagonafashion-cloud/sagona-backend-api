<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | SAGONA</title>

    <link rel="stylesheet" href="/nc_assets/css/style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="/favicon.ico">
    <!-- Favicon Setup -->
    <link rel="icon" href="/nc_assets/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/nc_assets/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/nc_assets/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/nc_assets/img/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
</head>

<body>

    <header class="header">
        <div class="container nav">
            <a class="brand" href="index.html">SAGONA</a>
        </div>
    </header>

    <main class="container" style="padding: 4rem 0">

        <form id="login-form" class="panel" style="max-width: 420px; margin:auto">

            <h1 class="page-title">Welcome Back</h1>
            <p style="color:#6e665c;">Login to continue shopping</p>

            <input name="email" type="email" class="field" placeholder="Email" required />
            <input name="password" type="password" class="field" placeholder="Password" required />

            <button class="btn gold" type="submit">Login</button>

            <p style="margin-top:1rem;">
                New here? <a href="register.html">Create account</a>
            </p>

            <p id="error-msg" style="color:red; display:none;"></p>

        </form>

    </main>

    <script type="module">
        import { request } from './js/api.js';
        import { saveToken, saveUser } from './js/storage.js';

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorMsg.style.display = "none";

            const btn = form.querySelector("button");
            btn.disabled = true;
            btn.textContent = "Logging in...";

            try {
                const data = await request('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        email: form.email.value,
                        password: form.password.value
                    })
                });

                saveToken(data.token);
                saveUser(data);

                window.location.href = "index.html";

            } catch (err) {
                errorMsg.textContent = err.message || "Login failed";
                errorMsg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Login";
            }
        });
    </script>

</body>

</html>
