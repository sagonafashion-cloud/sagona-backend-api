<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- SEO -->
    <title>Shop Luxury Kids Wear | SAGONA</title>
    <meta name="description"
        content="Shop premium luxury kids dresses and outfits at SAGONA. Designer wear crafted for elegance.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Styles -->
    <link rel="stylesheet" href="nc_assets/css/style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="lux-header">
        <h1 class="brand">SAGONA</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html" class="active">Shop</a>
            <a href="cart.html">Cart</a>
            <a href="wishlist.html">Wishlist</a>
        </nav>
    </header>

    <!-- ================= SHOP ================= -->
    <main class="shop-page">

        <h2 class="page-title">Luxury Kids Collection</h2>

        <section class="products">

            <!-- PRODUCT CARD -->
            <div class="product-card">
                <img src="nc_assets/img/product1.jpg" alt="Luxury Kids Dress" class="product-img">

                <h3 class="product-title">Luxury Kids Dress</h3>

                <!-- Gold price -->
                <p class="price luxury">₹999</p>

                <div class="product-actions">
                    <button class="add-to-cart"
                        data-name="Luxury Kids Dress"
                        data-price="999">
                        Add to Cart
                    </button>

                    <button class="add-to-wishlist"
                        data-name="Luxury Kids Dress"
                        data-price="999">
                        ♡ Wishlist
                    </button>
                </div>
            </div>

            <!-- 🔮 Future products go here (same structure) -->

        </section>

    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
        <a href="returns.html">Returns & Exchange</a>
    </footer>

    <!-- ================= SCRIPT ================= -->
    <script src="nc_assets/js/main.js"></script>

</body>

</html>
