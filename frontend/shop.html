<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGONA</title>

<link rel="stylesheet" href="nc_assets/css/style.css">

<style>
body {
    margin: 0;
    font-family: "Helvetica Neue", sans-serif;
    background: #f8f6f2;
    color: #111;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: #f8f6f2;
}

.logo {
    font-size: 28px;
    letter-spacing: 4px;
}

.nav {
    display: flex;
    gap: 40px;
}

.nav a {
    text-decoration: none;
    color: #222;
    font-size: 14px;
    letter-spacing: 2px;
}

/* HERO */
.hero {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    align-items: center;
}

.hero img {
    width: 100%;
    height: 90vh;
    object-fit: cover;
}

.hero-text {
    padding: 60px;
}

.hero-text h1 {
    font-size: 60px;
    font-weight: 300;
}

.hero-text p {
    margin-top: 20px;
    line-height: 1.6;
}

.hero-btn {
    margin-top: 30px;
    padding: 14px 30px;
    border: none;
    background: black;
    color: white;
    letter-spacing: 2px;
    cursor: pointer;
}

/* PRODUCTS */
.section {
    padding: 80px 60px;
}

.section h2 {
    font-size: 40px;
    font-weight: 300;
}

.products {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    margin-top: 40px;
}

.product {
    cursor: pointer;
}

.product img {
    width: 100%;
    height: 350px;
    object-fit: cover;
}

.product h3 {
    margin: 10px 0 5px;
    font-size: 18px;
}

.product p {
    color: #555;
}

/* FOOTER */
.footer {
    background: #111;
    color: #ccc;
    padding: 60px;
    display: flex;
    justify-content: space-between;
}

.footer h2 {
    color: white;
}

.footer-links {
    display: flex;
    gap: 80px;
}

.footer-links div p {
    margin: 8px 0;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="nav">
        <a href="#">SHOP</a>
        <a href="#">GIRLS</a>
        <a href="#">BOYS</a>
        <a href="#">BABY</a>
    </div>

    <div class="logo">SAGONA</div>

    <div>
        <a href="cart.html">🛍</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <img src="https://images.unsplash.com/photo-1604917018610-2dffebbf6b5d" alt="hero">

    <div class="hero-text">
        <h1>A slow atelier for the very small.</h1>
        <p>
            Tailored by hand in limited runs. Italian wools, French lace, organic cotton.
        </p>

        <button class="hero-btn">EXPLORE COLLECTION</button>
    </div>
</div>

<!-- PRODUCTS -->
<div class="section">
    <h2>Quiet favourites.</h2>

    <div class="products" id="products"></div>
</div>

<!-- FOOTER -->
<div class="footer">
    <div>
        <h2>SAGONA</h2>
        <p>Heirloom-quality kidswear.</p>
    </div>

    <div class="footer-links">
        <div>
            <p>All</p>
            <p>Girls</p>
            <p>Boys</p>
            <p>Baby</p>
        </div>

        <div>
            <p>Atelier</p>
            <p>Care</p>
            <p>Shipping</p>
        </div>
    </div>
</div>

<script src="nc_assets/js/shop.js"></script>

</body>
</html>
