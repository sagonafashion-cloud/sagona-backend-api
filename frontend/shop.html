<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Shop | SAGONA</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/nc_assets/css/style.css">

    <!-- Favicon -->
    <link rel="icon" href="/nc_assets/img/favicon-32x32.png">
</head>

<body>

    <!-- TOP STRIP -->
    <div class="top-strip">NEW SEASON · FREE SHIPPING ABOVE ₹7,500</div>

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="nav">
                <a class="brand" href="index.html">SAGONA</a>

                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="wishlist.html">Wishlist</a>
                    <a href="cart.html">Cart</a>
                    <a href="login.html">Sign In</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container">

        <h1 class="page-title">Shop</h1>

        <div class="shop-layout">

            <!-- SIDEBAR -->
            <aside class="sidebar">
                <h3>Filters</h3>

                <input type="text" id="search" placeholder="Search products">

                <div class="filter-group">
                    <h4>Price</h4>
                    <label><input type="radio" name="price" value=""> All</label>
                    <label><input type="radio" name="price" value="0-2000"> Under ₹2000</label>
                    <label><input type="radio" name="price" value="2000-5000"> ₹2000–₹5000</label>
                    <label><input type="radio" name="price" value="5000+"> Above ₹5000</label>
                </div>

                <div class="filter-group">
                    <h4>Sort</h4>
                    <select id="sort">
                        <option value="">Default</option>
                        <option value="low">Price Low → High</option>
                        <option value="high">Price High → Low</option>
                    </select>
                </div>
            </aside>

            <!-- PRODUCTS -->
            <section class="shop-content">
                <div id="shop-grid" class="product-grid"></div>
            </section>

        </div>

    </main>

    <!-- QUICK VIEW -->
    <div id="quick-view" class="quick-view">
        <div class="quick-content">
            <span onclick="closeQuickView()" class="close">&times;</span>
            <div id="quick-body"></div>
        </div>
    </div>

    <!-- JS -->
    <script type="module" src="/nc_assets/js/main.js"></script>

</body>

</html>
