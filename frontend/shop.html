<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- SEO -->
    <title>Shop Luxury Kids Wear | SAGONA</title>
    <meta name="description"
        content="Shop premium luxury kids dresses and outfits at SAGONA. Designer wear crafted for elegance.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Styles -->
    <link rel="stylesheet" href="nc_assets/css/style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="lux-header">
        <h1 class="brand">SAGONA</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html" class="active">Shop</a>
            <a href="cart.html">Cart</a>
            <a href="wishlist.html">Wishlist</a>
        </nav>
    </header>

    <!-- ================= SHOP ================= -->
    <main class="shop-page">

        <h2 class="page-title">Luxury Kids Collection</h2>

        <!-- ✅ DYNAMIC PRODUCT GRID -->
        <section class="products" id="productGrid">
            <p>Loading products...</p>
        </section>

    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
        <a href="returns.html">Returns & Exchange</a>
    </footer>

    <!-- ================= SCRIPT ================= -->
    <script>
        const API = "https://sagona-backend-api.onrender.com/api/products";

        async function loadProducts() {
            try {
                const res = await fetch(API);
                const products = await res.json();

                const grid = document.getElementById("productGrid");

                if (!products.length) {
                    grid.innerHTML = "<p>No products available</p>";
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="product-card">
                        <img src="nc_assets/img/product1.jpg">

                        <h3 class="product-title">${p.name}</h3>

                        <p class="price luxury">₹${p.price}</p>

                        <div class="product-actions">
                            <button onclick="addToCart('${p._id}', '${p.name}', ${p.price})">
                                Add to Cart
                            </button>

                            <button onclick="addToWishlist('${p._id}', '${p.name}', ${p.price})">
                                ♡ Wishlist
                            </button>
                        </div>
                    </div>
                `).join("");

            } catch (err) {
                console.error(err);
                document.getElementById("productGrid").innerHTML =
                    "<p>Error loading products</p>";
            }
        }

        function addToCart(id, name, price) {
            const cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push({ id, name, price, quantity: 1 });
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Added to cart");
        }

        function addToWishlist(id, name, price) {
            const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
            wishlist.push({ id, name, price });
            localStorage.setItem("wishlist", JSON.stringify(wishlist));
            alert("Added to wishlist");
        }

        loadProducts();
    </script>

</body>

</html>
