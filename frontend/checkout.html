<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkout – SAGONA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="nc_assets/css/style.css">
</head>

<body>

    <header class="lux-header">
        <h1>SAGONA Checkout</h1>
    </header>

    <main style="max-width:600px;margin:50px auto;">

        <h2>Delivery Details</h2>

        <input id="parentName" placeholder="Full Name" style="width:100%;padding:10px;margin-bottom:10px;">
        <input id="address" placeholder="Address" style="width:100%;padding:10px;margin-bottom:10px;">

        <select id="paymentMethod" style="width:100%;padding:10px;margin-bottom:20px;">
            <option value="COD">Cash on Delivery</option>
            <option value="ONLINE">Online Payment</option>
        </select>

        <button id="placeOrder">Place Order</button>

    </main>

    <script src="nc_assets/js/checkout.js"></script>

</body>

</html>
