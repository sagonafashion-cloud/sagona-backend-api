<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout | SAGONA</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="icon" href="/favicon.ico">
<!-- Favicon Setup -->
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
</head>

<body>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html">SAGONA</a>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">Checkout</h1>

    <div class="layout-2">

      <!-- FORM -->
      <form id="checkout-form" class="panel">

        <label>Name</label>
        <input id="customerName" class="field" disabled />

        <label>Phone</label>
        <input id="phone" class="field" required />

        <label>Address</label>
        <textarea id="address" class="field" required></textarea>

        <label>Birthday</label>
        <input id="birthday" type="date" class="field" />

        <label>Payment</label>
        <select id="paymentMethod" class="field">
          <option value="COD">Cash on Delivery</option>
          <option value="ONLINE">Online (Razorpay)</option>
        </select>

        <button class="btn gold" type="submit">
          Place Order
        </button>

      </form>

      <!-- SUMMARY -->
      <aside class="panel">
        <p>Loyalty Points: <strong id="loyalty-points">0</strong></p>
        <p>Birthday Discount: ₹<strong id="birthday-discount">0</strong></p>
        <h3>Total: ₹<span id="checkout-total">0</span></h3>
      </aside>

    </div>
  </main>

  <script type="module" src="./js/checkout.js"></script>
</body>

</html>
