<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout | SAGONA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/nc_assets/CCS/style.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html">SAGONA</a>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title" style="margin-top:0">Checkout</h1>

    <div class="checkout-layout">

      <!-- SHIPPING + PAYMENT FORM -->
      <form id="checkout-form">

        <h3 class="checkout-form-section">Shipping Address</h3>

        <div class="form-group">
          <label>Full Name *</label>
          <input id="customerName" class="field" type="text" required placeholder="Name on delivery" autocomplete="name" />
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input id="phone" class="field" type="tel" required placeholder="10-digit mobile number" />
        </div>

        <div class="form-group">
          <label>Address Line 1</label>
          <input id="address" class="field" required placeholder="House / flat / street" />
        </div>

        <div class="form-group">
          <label>Address Line 2 <span style="color:var(--light-gray)">(optional)</span></label>
          <input id="address2" class="field" placeholder="Landmark, area" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>City</label>
            <input id="city" class="field" required placeholder="Mumbai" />
          </div>
          <div class="form-group">
            <label>State</label>
            <input id="state" class="field" required placeholder="Maharashtra" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Pincode</label>
            <input id="pincode" class="field" required placeholder="400001" maxlength="6" inputmode="numeric" />
          </div>
          <div class="form-group">
            <label>Birthday <span style="color:var(--light-gray)">(optional)</span></label>
            <input id="birthday" type="date" class="field" />
          </div>
        </div>

        <h3 class="checkout-form-section" style="margin-top:24px">Payment Method</h3>

        <div class="payment-options">
          <label class="payment-option">
            <input type="radio" name="payment" id="paymentMethod" value="COD" checked>
            <span>
              <strong>Cash on Delivery</strong>
              <span style="display:block;font-size:11px;color:var(--gray)">Pay when your order arrives</span>
            </span>
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="ONLINE">
            <span>
              <strong>Online Payment</strong>
              <span style="display:block;font-size:11px;color:var(--gray)">Cards, UPI, Net Banking via Razorpay</span>
            </span>
          </label>
        </div>

        <button class="btn gold" type="submit" style="width:100%;margin-top:28px;padding:16px">
          Place Order
        </button>

      </form>

      <!-- ORDER SUMMARY -->
      <aside class="checkout-summary">
        <h3>Order Summary</h3>

        <div id="order-items-preview" style="margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:16px;font-size:13px;color:var(--gray)">
          Loading…
        </div>

        <div class="summary-row"><span>Subtotal</span><span id="checkout-subtotal">₹0</span></div>
        <div class="summary-row"><span>Shipping</span><span id="checkout-shipping">—</span></div>
        <div class="summary-row"><span>GST (est. 5%)</span><span id="checkout-gst">—</span></div>
        <div class="summary-row total">
          <span>Grand Total</span>
          <span style="color:var(--gold)">₹<span id="checkout-total">0</span></span>
        </div>
        <p class="gst-note">* Final GST calculated based on your state and product category</p>

        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--gray)">
          <p>🎁 Loyalty Points: <strong id="loyalty-points">0</strong></p>
          <p style="margin-top:4px">🎂 Birthday Discount: ₹<strong id="birthday-discount">0</strong></p>
        </div>
      </aside>

    </div>
  </main>

  <script type="module" src="/nc_assets/js/checkout.js"></script>

</body>
</html>
